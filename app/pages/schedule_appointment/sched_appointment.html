<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../index.css" >
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../../index.js" type="text/javascript"></script>
    <script src="./sched_appointment.js" type="text/javascript"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <title>Agende su cita</title>
</head>

<body>
    <div class="container my-5">
      <h2 class="text-center">AGENDA TU CITA</h2>
  
      <!-- Stepper -->
      <div class="d-flex align-items-center justify-content-center my-4">
        <div class="text-center">
          <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" 
               style="width: 40px; height: 40px;" id="step-circle-1">1</div>
        </div>
        <div class="flex-grow-1 border-top" id="line-1" style="height: 2px;"></div>
        <div class="text-center">
          <div class="rounded-circle bg-light text-dark d-flex align-items-center justify-content-center border border-primary" 
               style="width: 40px; height: 40px;" id="step-circle-2">2</div>
        </div>
        <div class="flex-grow-1 border-top" id="line-2" style="height: 2px;"></div>
        <div class="text-center">
          <div class="rounded-circle bg-light text-dark d-flex align-items-center justify-content-center border border-primary" 
               style="width: 40px; height: 40px;" id="step-circle-3">3</div>
        </div>
      </div>
  
      <!-- Contenido del Stepper -->
      <div id="step-1" class="step-content d-flex flex-column justify-content-center align-items-center bg-light py-4 rounded">
        <h3 class="text-center">Datos personales</h3>
        <p>Todos los datos son necesarios</p>
        <div class="container w-75">
            <div class="row w-lg-50">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="inputName" class="form-label">Nombres</label>
                        <input name="name" type="text" class="form-control" id="inputName" placeholder="Ej. José María" required pattern="\b[A-Z][a-z]+(?:\s[A-Z][a-z]+)*\b" onblur="inputValidation(event)">
                        <div class="invalid-feedback" data-input-error="inputName"></div>
                    </div>
                    <div class="mb-3">
                        <label for="inputLastName" class="form-label">Apellidos *</label>
                        <input name="lastName" type="text" class="form-control" id="inputLastName" placeholder="Ej. Mendez Hernandez" required pattern="\b[A-Z][a-z]+(?:\s[A-Z][a-z]+)*\b" onblur="inputValidation(event)">
                        <div class="invalid-feedback" data-input-error="inputLastName"></div>
                    </div>
                    <div class="mb-3">
                        <label for="inputEmail" class="form-label">Email *</label>
                        <input name="email" type="email" class="form-control" id="inputEmail" placeholder="mymail@mail.com" required onblur="inputValidation(event)">
                        <div class="invalid-feedback" data-input-error="inputEmail"></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="bloodTypeSelect" class="form-label">Tipo de sangre</label>
                        <select name="bloodType" class="form-select" id="bloodTypeSelect">
                            <option selected disabled hidden>Selecciona uno</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">¿Padeces alguna enfermedad?</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="diseaseOption" id="diseaseYes" onchange="diseasesEnabled()">
                            <label class="form-check-label" for="diseaseYes">Sí</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="diseaseOption" id="diseaseNo" onchange="diseasesDisabled()">
                            <label class="form-check-label" for="diseaseNo">No</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="diseasesSelect" class="form-label">Enfermedades</label>
                        <select id="diseasesSelect" class="form-select">
                            <option value="" disabled selected hidden>Selecciona uno</option>
                            <option value="diabetes">Diabetes</option>
                            <option value="hipertension">Hipertensión</option>
                            <option value="asma">Asma</option>
                            <option value="artritis">Artritis</option>
                            <option value="cancer">Cáncer</option>
                        </select>
                        <div id="selectedDiseases" class="d-flex flex-wrap gap-2 mt-2">
                            <!-- Pills de enfermedades seleccionadas -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <button class="btn btn-primary" onclick="nextStep(1)">Siguiente</button>
      </div>

      <div id="step-2" class="step-content d-none flex-column justify-content-center align-items-center bg-light py-4 rounded">
        <h3 class="text-center">Datos de cita</h3>
        <p>Todos los datos son necesarios</p>
        <div class="container w-75 bg-light p-4 rounded">
            <div class="row w-lg-50">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="institutionSelected" class="form-label">Hospital o institución</label>
                        <select name="bloodType" class="form-select" id="institutionSelected">
                            <option selected disabled hidden>Selecciona al que asistirás</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                    <p class="mb-2">Notas importantes</p>
                    <div class="form-floating">
                        <textarea class="form-control" placeholder="Leave a comment here" id="notesAppointment" style="height: 100px"></textarea>
                        <label for="notesAppointment" class="text-primary">Escribe aquí</label>
                      </div>
                </div>
                <div class="col-md-6 mt-3 mt-lg-0">
                    <!-- Contenedor del calendario -->
                    <label class="form-label">Elige una fecha y hora</label>
                    <div id="datepicker" class="border rounded p-3 d-none"></div>
                    <!-- Contenedor de las horas disponibles -->
                    <div id="available-times" class="d-flex flex-wrap gap-2 mt-4"></div>
                </div>

            </div>            
        </div>
        <button class="btn btn-primary" onclick="nextStep(2)">Siguiente</button>         
      </div>

      <div id="step-3" class="step-content d-none d-flex flex-column justify-content-center align-items-center" style="height: 50vh;">
        <i class="bi bi-check-circle-fill fs-1 text-success text-center"></i>
        <h3 class="text-center">Tu cita se ha agendado correctamente</h3>
        <p>Para ver todos los detalles ve al inicio </p>
        <button class="btn btn-primary" onclick="finishStepper()">Finalizar</button>
      </div>
    </div>

  </body>

</html>
